name: Deploy sites to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and deploy each Cloudflare-hosted site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          npm install -g wrangler@3

          SLUGS="budget-decor-ideas dating-after-divorce everyday-fitness-motivation friendship-files gift-guide-by-sign golden-years-guide houseplant-care-hub in-law-relationships introvert-life language-learning-tips"

          for slug in $SLUGS; do
            if [ ! -d "sites/$slug" ]; then
              echo "::warning::sites/$slug not found, skipping"
              continue
            fi
            echo "=== Building $slug ==="
            ( cd "sites/$slug" && npm install --no-audit --no-fund && npm run build )
            echo "=== Deploying $slug to Cloudflare Pages ==="
            wrangler pages deploy "sites/$slug/dist" --project-name="$slug" --branch=main --commit-dirty=true
          done
